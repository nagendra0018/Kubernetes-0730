apiVersion: storage.k8s.io/v1
kind: StorageClass

metadata:
  name: ebs-storage

provisioner: ebs.csi.aws.com

allowVolumeExpansion: true   

volumeBindingMode: WaitForFirstConsumer
#volumeBindingMode: immediate

reclaimPolicy: Delete #if pvc delete automatically EBS delete
#reclaimPolicy: Retain #if pvc delete staill  EBS is there not delete untill delete manually ebs levele 


parameters:
  type: gp3
